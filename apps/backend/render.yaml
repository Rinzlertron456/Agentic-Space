services:
  - type: web
    name: agentic-space-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install --include=dev && npm run build -w packages/shared && npm run build -w apps/backend
    startCommand: node apps/backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"
      - key: FRONTEND_URL
        value: https://frontend-sooty-seven-q13y3obahx.vercel.app
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBED_MODEL
        value: text-embedding-3-small
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: BROWSER_HEADLESS
        value: "true"
      - key: PORT
        value: "3001"
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
