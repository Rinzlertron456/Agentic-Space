services:
  job-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-this-before-deploy}"
      JOB_AGENT_DB_PATH: "/app/.data/job_agent.sqlite"
      MASTER_RESUME_DOCX: "/app/input/Full_Stack_AI_Developer_Resume.docx"
      RESUME_ARTIFACT_DIR: "/app/artifacts/resumes"
      LOG_ARTIFACT_DIR: "/app/artifacts/logs"
    volumes:
      - job-agent-data:/app/.data
      - ./artifacts:/app/artifacts
      - ./input:/app/input:ro

volumes:
  job-agent-data:
